services:
  sentry-telegram:
    build:
      context: /opt/docker/sentry-alert-monitoring
      # build-time proxy so `pip install` can reach PyPI. These are predefined
      # Docker build args, injected into every RUN — the `environment:` block
      # below does NOT apply during build, only at runtime.
      args:
        HTTP_PROXY: "http://10.16.195.94:8080"
        HTTPS_PROXY: "http://10.16.195.94:8080"
        NO_PROXY: "localhost,127.0.0.1"
    ports:
      - "8080:8080"
    container_name: sentry-telegram
    restart: unless-stopped
    environment:
      DB_PATH: "data/state.db"
      ENABLE_LLM: "false"
      ANTHROPIC_API_KEY: "-"
      ANTHROPIC_MODEL: "-"
      TELEGRAM_SSL_INSECURE: "true"
      TELEGRAM_CA_BUNDLE: "-"
      TELEGRAM_BOT_TOKEN: "8961493849:AAGduVKIaQOToo2LPont4zdmK-ats3hDgBQ"
      TELEGRAM_CHAT_ID: "-1003221319576:8"
      SENTRY_CLIENT_SECRET: "3c9ecec4dfdee101edf20f0f096b80753408dd6cef075c6f84113feb3e34150d"

      HTTP_PROXY: "http://10.16.195.94:8080"
      HTTPS_PROXY: "http://10.16.195.94:8080"
      http_proxy: "http://10.16.195.94:8080"
      https_proxy: "http://10.16.195.94:8080"
    volumes:
      # persist the debounce db across restarts (DB_PATH=data/state.db -> /app/data)
      - sentry_telegram_state:/app/data
    networks:
      # reachable from the Sentry stack as http://sentry-telegram:8080
      - sentry-self-hosted_default

volumes:
  sentry_telegram_state:

networks:
  sentry-self-hosted_default:
    external: true
